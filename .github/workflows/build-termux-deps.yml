name: Build Termux Dependencies

on:
  workflow_dispatch:
    inputs:
      better_sqlite3_version:
        description: 'better-sqlite3 version to build'
        required: true
        default: '11.10.0'
  release:
    types: [published]

jobs:
  build-better-sqlite3:
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Determine better-sqlite3 version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "bs3_version=${{ github.event.inputs.better_sqlite3_version }}" >> "$GITHUB_OUTPUT"
          else
            # Read from lockfile or package.json
            BS3_VER=$(node -e "
              const pkg = require('./packages/server/package.json');
              const spec = (pkg.optionalDependencies || {})['better-sqlite3'] || '';
              // Strip semver range prefix
              console.log(spec.replace(/^[\^~>=<]+/, ''));
            ")
            echo "bs3_version=${BS3_VER}" >> "$GITHUB_OUTPUT"
          fi
          echo "Building better-sqlite3 v$(cat "$GITHUB_OUTPUT" | grep bs3_version | cut -d= -f2)"

      - name: Set up Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r27c

      - name: Cross-compile better-sqlite3 for Android ARM64
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
          BS3_VERSION: ${{ steps.version.outputs.bs3_version }}
        run: |
          set -euo pipefail

          # Create build directory
          BUILD_DIR=$(mktemp -d)
          cd "$BUILD_DIR"

          # Download and extract better-sqlite3 source
          npm pack "better-sqlite3@${BS3_VERSION}"
          tar xzf "better-sqlite3-${BS3_VERSION}.tgz"
          cd package

          # Install build dependency (node-addon-api)
          npm install node-addon-api

          # Install node-gyp
          npm install -g node-gyp

          # Set cross-compilation environment
          # Use aarch64-linux-android28 for broad compatibility (Android 9+)
          TOOLCHAIN="${ANDROID_NDK_HOME}/toolchains/llvm/prebuilt/linux-x86_64"

          export CC="${TOOLCHAIN}/bin/aarch64-linux-android28-clang"
          export CXX="${TOOLCHAIN}/bin/aarch64-linux-android28-clang++"
          export AR="${TOOLCHAIN}/bin/llvm-ar"

          # Force Linux build path — bypasses binding.gyp's Android NDK path
          # which expects android_ndk_path variable we don't set
          export GYP_DEFINES="OS=linux"

          # Build
          node-gyp rebuild --release --loglevel=verbose --arch=arm64

          # Verify
          file build/Release/better_sqlite3.node
          ls -la build/Release/better_sqlite3.node

          # Copy to workspace for upload
          mkdir -p "${GITHUB_WORKSPACE}/dist"
          cp build/Release/better_sqlite3.node "${GITHUB_WORKSPACE}/dist/better_sqlite3-android-arm64.node"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: better-sqlite3-android-arm64
          path: dist/better_sqlite3-android-arm64.node

      - name: Upload to release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            dist/better_sqlite3-android-arm64.node \
            --clobber
